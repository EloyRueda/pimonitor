<!DOCTYPE html>
<html>
<head>
    <title>Configurar 2FA - PiMonitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <h1>Activar Segundo Factor</h1>
    <p>1. Descarga <b>Google Authenticator</b> o <b>Authy</b> en tu móvil.</p>
    <p>2. Escanea este código:</p>

    <div id="qrcode"></div>

    <p>3. O introduce la clave manualmente: <code>{{ secret }}</code></p>

    <hr>
    <form action="/verify-2fa" method="POST">
        <label>Introduce el código de 6 dígitos que ves en el móvil:</label><br>
        <input type="text" name="token" placeholder="000000" maxlength="6" required>
        <button type="submit">Verificar y Activar</button>
    </form>

    <script>
        // Genera el QR usando la URI que se envía desde Flask
        new QRCode(document.getElementById("qrcode"), "{{ uri }}");
    </script>
</body>
</html>
